services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle_bd1
    environment:
      ORACLE_PASSWORD: admin1234
      ORACLE_DATABASE: XEPDB1
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./init:/container-entrypoint-initdb.d
    restart: unless-stopped

volumes:
  oracle_data: